name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ci-${{ hashFiles('requirements.txt', 'requirements.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-ci-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -c requirements.lock ruff black mypy pytest pytest-cov pytest-mock

      - name: Resolve Python targets
        id: targets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --depth=1 origin "${{ github.base_ref }}"
            PY_FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -E '\\.py$' || true)
          else
            PY_FILES=$(git ls-files '*.py')
          fi

          RUNTIME_FILES=$(printf '%s\n' "$PY_FILES" | grep -E '^(akf/|rag/|cli.py|llm_providers.py|logger.py|exceptions.py)' || true)

          {
            echo "py_files<<EOF"
            printf '%s\n' "$PY_FILES"
            echo "EOF"
            echo "runtime_files<<EOF"
            printf '%s\n' "$RUNTIME_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Ruff
        if: steps.targets.outputs.py_files != ''
        run: |
          echo "Lint targets:" 
          echo "${{ steps.targets.outputs.py_files }}"
          ruff check ${{ steps.targets.outputs.py_files }}

      - name: Ruff (no Python changes)
        if: steps.targets.outputs.py_files == ''
        run: echo "No changed Python files to lint"

      - name: Black
        if: steps.targets.outputs.py_files != ''
        run: black --check ${{ steps.targets.outputs.py_files }}

      - name: Mypy
        if: steps.targets.outputs.runtime_files != ''
        run: mypy ${{ steps.targets.outputs.runtime_files }}

      - name: Mypy (no runtime Python changes)
        if: steps.targets.outputs.runtime_files == ''
        run: echo "No changed runtime Python files for mypy"

      - name: Pytest with coverage gate
        run: |
          pytest tests/ -q --cov=akf --cov=rag --cov-report=term-missing --cov-fail-under=85
