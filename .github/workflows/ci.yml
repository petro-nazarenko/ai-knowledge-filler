name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ci-${{ hashFiles('requirements.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-ci-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements.lock -e ".[all,dev]"

      - name: Ruff
        run: ruff check . --select E9,F63,F7,F82

      - name: Pytest with coverage gate
        run: |
          pytest tests/ -q --cov=akf --cov=rag --cov-report=term-missing --cov-fail-under=85
