name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ci-${{ hashFiles('requirements.txt', 'requirements.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-ci-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy pytest pytest-cov pytest-mock

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Mypy
        run: mypy akf rag cli.py llm_providers.py logger.py exceptions.py

      - name: Pytest with coverage gate
        run: |
          pytest tests/ -q --cov=akf --cov=rag --cov-report=term-missing --cov-fail-under=90
